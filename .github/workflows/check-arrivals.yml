name: Check 2ndstreet Arrivals

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm install && npx playwright install-deps chrome

      - name: Check arrivals
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node check-arrivals.js

      - name: Save seen IDs
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add seen-ids.json
          git diff --staged --quiet || git commit -m "Update seen IDs"
          git push
